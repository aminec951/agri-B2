<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSuivi – Observations</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #0F1410;
            color: #E8E5DD;
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 180px;
            background-color: #1A211D;
            border-radius: 16px;
            padding: 20px;
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
            color: #C5F558;
            margin-bottom: 30px;
        }

        .menu {
            list-style: none;
        }

        .menu li {
            padding: 10px 12px;
            margin-bottom: 5px;
            border-radius: 8px;
            color: #888;
            cursor: pointer;
        }

        .menu li.actif {
            background-color: #C5F558;
            color: #0F1410;
            font-weight: bold;
        }

        .menu li a {
            color: inherit;
            text-decoration: none;
            display: block;
        }

        /* --- CONTENU --- */
        .contenu {
            flex: 1;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 16px;
            margin-bottom: 16px;
        }

        /* --- GRILLE 2 COLONNES --- */
        .grille {
            display: grid;
            grid-template-columns: 1fr 1.4fr;
            gap: 15px;
        }

        /* --- CARTE --- */
        .carte {
            background-color: #1A211D;
            border-radius: 16px;
            padding: 20px;
        }

        /* --- FORMULAIRE --- */
        .champ {
            margin-bottom: 14px;
        }

        .champ label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 6px;
        }

        .champ select,
        .champ input,
        .champ textarea {
            width: 100%;
            background-color: #0F1410;
            border: 1px solid #2A3A30;
            border-radius: 8px;
            padding: 10px 12px;
            color: #E8E5DD;
            font-size: 14px;
            font-family: Arial, sans-serif;
            outline: none;
        }

        .champ textarea {
            height: 80px;
            resize: none;
        }

        /* --- BOUTONS ETAT --- */
        .etats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .btn-etat {
            background-color: #0F1410;
            border: 1px solid #2A3A30;
            border-radius: 8px;
            padding: 8px;
            color: #888;
            font-size: 12px;
            cursor: pointer;
        }

        .btn-etat.actif {
            background-color: #1E3A10;
            border-color: #C5F558;
            color: #C5F558;
            font-weight: bold;
        }

        /* --- BOUTON ENVOYER --- */
        .btn-envoyer {
            width: 100%;
            background-color: #C5F558;
            color: #0F1410;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 6px;
        }

        /* --- MESSAGE SUCCES --- */
        .msg-succes {
            display: none;
            background-color: #1E3A10;
            border: 1px solid #C5F558;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            color: #C5F558;
            font-size: 13px;
            margin-top: 10px;
        }

        /* --- HISTORIQUE --- */
        .historique-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .filtre {
            background-color: #0F1410;
            border: 1px solid #2A3A30;
            border-radius: 8px;
            padding: 6px 10px;
            color: #E8E5DD;
            font-size: 12px;
            outline: none;
        }

        /* --- UNE OBSERVATION --- */
        .obs {
            display: flex;
            gap: 12px;
            padding-bottom: 14px;
            border-bottom: 1px solid #1E2820;
            margin-bottom: 14px;
        }

        .obs:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .point {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 5px;
            flex-shrink: 0;
        }

        .point-vert   { background-color: #C5F558; }
        .point-orange { background-color: #F5A65B; }
        .point-rouge  { background-color: #E04545; }
        .point-bleu   { background-color: #5BAFF5; }

        .obs-info { flex: 1; }

        .obs-ligne1 {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        .obs-etat { font-size: 13px; font-weight: bold; }
        .obs-date { font-size: 11px; color: #888; }
        .obs-parcelle { font-size: 12px; color: #C5F558; margin-bottom: 3px; }
        .obs-commentaire { font-size: 12px; color: #888; }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            body { flex-direction: column; padding: 10px; }
            .sidebar { width: 100%; }
            .menu { display: flex; gap: 5px; flex-wrap: wrap; }
            .grille { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">🌱 AgroSuivi</div>
        <ul class="menu">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="parcelles.html">Parcelles</a></li>
            <li class="actif"><a href="observations.html">Observations</a></li>
            <li><a href="alertes.html">Alertes</a></li>
        </ul>
    </div>

    <!-- CONTENU -->
    <div class="contenu">
        <h1>Observations</h1>

        <div class="grille">

            <!-- FORMULAIRE -->
            <div class="carte">
                <h2>Nouvelle observation</h2>

                <div class="champ">
                    <label>Parcelle</label>
                    <select id="champ-parcelle">
                        <option value="">Choisir une parcelle...</option>
                    </select>
                </div>

                <div class="champ">
                    <label>Date</label>
                    <input type="date" id="champ-date">
                </div>

                <div class="champ">
                    <label>État de la culture</label>
                    <div class="etats">
                        <button class="btn-etat actif" onclick="choisirEtat(this, 'Normal')">✅ Normal</button>
                        <button class="btn-etat" onclick="choisirEtat(this, 'Stress hydrique')">💧 Stress hydrique</button>
                        <button class="btn-etat" onclick="choisirEtat(this, 'Maladie détectée')">🦠 Maladie</button>
                        <button class="btn-etat" onclick="choisirEtat(this, 'Autre')">📋 Autre</button>
                    </div>
                </div>

                <div class="champ">
                    <label>Commentaire</label>
                    <textarea id="champ-commentaire" placeholder="Décrivez ce que vous avez observé..."></textarea>
                </div>

                <button class="btn-envoyer" onclick="envoyerObservation()">Enregistrer</button>
                <div class="msg-succes" id="message-succes">✅ Observation enregistrée !</div>
            </div>

            <!-- HISTORIQUE -->
            <div class="carte">
                <div class="historique-header">
                    <h2>Historique</h2>
                    <select class="filtre" id="filtre-parcelle" onchange="filtrer()">
                        <option value="">Toutes les parcelles</option>
                    </select>
                </div>
                <div id="liste-observations">
                    <p style="color:#888; font-size:13px;">Chargement...</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Adresse du serveur
        var serveur = "http://10.105.2.47:5000"

        // Etat choisi par défaut
        var etatChoisi = "Normal"

        // On garde toutes les observations pour le filtre
        var toutesLesObservations = []

        // On met la date du jour dans le formulaire
        document.getElementById("champ-date").value = new Date().toISOString().split("T")[0]

        // On charge les données au démarrage
        chargerParcelles()
        chargerObservations()


        // Charger les parcelles et les mettre dans les menus
        function chargerParcelles() {
            fetch(serveur + "/api/parcelles")
            .then(function(reponse) { return reponse.json() })
            .then(function(parcelles) {

                var menuFormulaire = document.getElementById("champ-parcelle")
                var menuFiltre = document.getElementById("filtre-parcelle")

                for (var i = 0; i < parcelles.length; i++) {
                    var p = parcelles[i]
                    menuFormulaire.innerHTML += '<option value="' + p.id + '">' + p.nom + ' — ' + p.localisation + '</option>'
                    menuFiltre.innerHTML += '<option value="' + p.id + '">' + p.nom + '</option>'
                }
            })
        }


        // Charger les observations depuis le serveur
        function chargerObservations() {
            fetch(serveur + "/api/observations")
            .then(function(reponse) { return reponse.json() })
            .then(function(observations) {
                toutesLesObservations = observations
                afficherObservations(observations)
            })
        }


        // Afficher les observations dans la liste
        function afficherObservations(observations) {
            var liste = document.getElementById("liste-observations")

            if (observations.length === 0) {
                liste.innerHTML = '<p style="color:#888; font-size:13px;">Aucune observation trouvée</p>'
                return
            }

            liste.innerHTML = ""

            for (var i = 0; i < observations.length; i++) {
                var o = observations[i]

                // Couleur du point selon l'état
                var couleur = "point-bleu"
                if (o.etat === "Normal") couleur = "point-vert"
                if (o.etat === "Stress hydrique") couleur = "point-orange"
                if (o.etat === "Maladie détectée") couleur = "point-rouge"

                // Date en format français
                var dateAffichee = new Date(o.date).toLocaleDateString("fr-FR")

                var commentaire = o.commentaire
                if (!commentaire) commentaire = "Aucun commentaire"

                liste.innerHTML +=
                    '<div class="obs">' +
                        '<div class="point ' + couleur + '"></div>' +
                        '<div class="obs-info">' +
                            '<div class="obs-ligne1">' +
                                '<span class="obs-etat">' + o.etat + '</span>' +
                                '<span class="obs-date">' + dateAffichee + '</span>' +
                            '</div>' +
                            '<div class="obs-parcelle">Parcelle ' + o.parcelle_id + '</div>' +
                            '<div class="obs-commentaire">' + commentaire + '</div>' +
                        '</div>' +
                    '</div>'
            }
        }


        // Quand on clique sur un bouton état
        function choisirEtat(bouton, etat) {
            var tousBoutons = document.querySelectorAll(".btn-etat")
            for (var i = 0; i < tousBoutons.length; i++) {
                tousBoutons[i].classList.remove("actif")
            }
            bouton.classList.add("actif")
            etatChoisi = etat
        }


        // Filtrer par parcelle
        function filtrer() {
            var parcelleId = document.getElementById("filtre-parcelle").value

            if (parcelleId === "") {
                afficherObservations(toutesLesObservations)
            } else {
                var resultat = []
                for (var i = 0; i < toutesLesObservations.length; i++) {
                    if (toutesLesObservations[i].parcelle_id == parcelleId) {
                        resultat.push(toutesLesObservations[i])
                    }
                }
                afficherObservations(resultat)
            }
        }


        // Envoyer une observation
        function envoyerObservation() {
            var parcelleId = document.getElementById("champ-parcelle").value
            var date = document.getElementById("champ-date").value
            var commentaire = document.getElementById("champ-commentaire").value

            if (parcelleId === "" || date === "") {
                alert("Veuillez choisir une parcelle et une date")
                return
            }

            var donnees = {
                date: date,
                etat: etatChoisi,
                parcelle_id: parseInt(parcelleId),
                commentaire: commentaire
            }

            fetch(serveur + "/api/observations", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(donnees)
            })
            .then(function(reponse) { return reponse.json() })
            .then(function() {
                document.getElementById("message-succes").style.display = "block"
                setTimeout(function() {
                    document.getElementById("message-succes").style.display = "none"
                }, 3000)
                document.getElementById("champ-commentaire").value = ""
                document.getElementById("champ-parcelle").value = ""
                chargerObservations()
            })
        }
    </script>

</body>
</html>
